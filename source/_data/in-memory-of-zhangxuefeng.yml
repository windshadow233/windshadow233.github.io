title: 张雪峰老师的人生感悟
subTitle: 时代的清醒剂，寒门的领路人
tips: 谨以此页面纪念那位在荒原中为我们指明方向的引路人...
limitPerPage: 20
blockquote: true
top_background: https://blogfiles.oss.fyz666.xyz/webp/37441ab4-1c83-4204-b8dd-efee20d085bb.webp
talk_list:
  - content: |
      任何人这一生他都不可能一直是顺风顺水，他也不可能一直是所谓的点儿背。
      当你生活当中遇到任何困难的时候，你都要咬紧牙关挺住，坚定的往前走，你相信曙光一定会在前方等着你。
  - content: 学习是你这辈子遇到过的最简单的事了。
  - content: 你现在吃的学习的苦，是为了以后少吃生活的苦。
  - content: 选择比努力更重要，但“有得选”的前提是你足够努力。
  - content: 所有唾手可得的快乐，都早已在暗中标好了价格。读书改变命运，从来不是一句空洞的口号；只有你今天的日积月累，才会换来明天别人的望尘莫及。
  - content: |
      普通人的人生，从来都不是先谈诗和远方，而是先解决柴米油盐。
      教育的意义，对于普通人来说，首先是让我们拥有生存的能力，让我们能在社会上站稳脚跟，不用为了生计疲于奔命。
  - content: |
      普通家庭的孩子，没有太多试错的资本，自己的人生只有一次，
      先顾好自己，努力提升自己，才有能力去爱别人，去守护想要的感情，若连自己都顾不住，再轰轰烈烈的爱情，也终将不堪一击。
  - content: |
      平安一生才是最大的成功。在这个内卷的时代，很多人被“必须成功”“必须优秀”的声音裹挟，拼命追赶，活得疲惫不堪。
      对普通人来说，摆脱贫困、家人安康、衣食无忧，平平安安过一辈子，就已经是莫大的幸福。
  - content: 亲戚朋友说“有事找我”，你听听就好，真到有事的时候，能帮你的屈指可数。
  - content: 什么是人脉？人脉不是你认识多少人，而是多少人认识你，并且在你需要的时候愿意帮你。
  - content: 人和人最公平的是每天都是有24小时，你利用得好，你就比别人靠前。一天的时间能够给勤勉的人带来智慧与力量，也能够给懒散的人留下一片悔恨。
  - content: |
      婚姻这件事，千万不要勉强。尤其是女孩子更不要勉强，不要说我到了什么时候，我一定要怎么样。
      得之我幸，失之我命！拥有的时候好好珍惜，没有的时候也没必要患得患失。
  - content: |
      说自己的话，做自己的事，走自己的路，修自己的道，不要操别人的心，不要管别人的事。
      这一点在填志愿时特别重要。七大姑八大姨的建议听听就好，最终买单的是孩子自己的一生。
  - content: 父母在，人生尚有来处；父母去，人生只剩归途。别等到他们不在了，才后悔当初没多陪陪他们。
  - content: 不要因为一片云而指着天空说没太阳。别因为一次考试失利、一次面试失败就否定自己。考研也好，求职也罢，都是长跑，不是百米冲刺。
  - content: 别相信怀才不遇，多数时候是怀才不够。
  - content: |
      若不给自己设限，则人生中就没有限制你发挥的藩篱。
      所有的胜利，与征服自己的胜利比起来，都是微不足道。所有的失败，与失去自己的失败比起来，更是微不足道。
  - content: 父母让你报某个专业，不一定是懂，但一定是为你好。你可以不听，但要好好沟通，别伤了他们的心。
  - content: 别在该奋斗的年纪选择安逸，也别在该安逸的年纪还在挣扎——但大多数人，一辈子都在挣扎。
  - content: 年轻人别沉迷“性价比”，要追求“不可替代性”。
  - content: 读书不是为了考高分，是为了让你有更多选择的权利，不用被迫向生活妥协。
  - content: 你穷的时候，别谈人脉，因为你没有交换价值。
  - content: 普通家庭的孩子，不要把希望寄托在“有关系”上，你最可靠的关系就是你自己。
  - content: 所谓“稳定”，不是“一辈子不换工作”，而是“你有能力应对任何变化”。真正的安全感，来自你的“不可替代性”。
  - content: 就业不是看你现在能赚多少钱，而是看你十年后能走到什么位置：选行业要看“赛道长度”，选岗位要看“能力成长空间”。
  - content: |
      如果你是一个内向老实的孩子，千万不能掉入社会底层。
      因为底层往往缺乏规则意识，内向者在其中更容易受欺负。
  - content: 没钱的时候，面子是最不值钱的东西。多少人因为放不下面子，错过了机会，耽误了正事。等你有了里子，面子自然就来了。
  - content: 你现在的焦虑，不是因为能力不够，而是因为欲望超过了本事。想要的太多，能做的太少，中间的距离就叫焦虑。
  - content: |
      你拼命想挤进去的那个圈子，人家根本不带你玩。不是因为你不够努力，是因为你的入场券是借来的。
      人脉、圈子这些东西，不是你进了那个门就属于你了。你的底气、资源、背景，决定你在这个圈子里是客人还是自己人。
  - content: |
      普通人家的孩子，最大的悲哀不是穷，是没有人给他指路。
      有钱人家的孩子，每一步都有人指点；普通人家的孩子，每一步都要自己摸爬滚打，摔得头破血流才明白一点道理。
  - content: 35岁不是职场终点，是你有没有核心竞争力的分水岭。如果你35岁还在做25岁也能做的事，那你就危险了。
  - content: 社会这东西，就像个大筛子似的。用学历筛掉那些不努力的孩子，用房子筛掉那些不努力的爹妈，再用工作筛掉那些没资源的家庭。
  - content: 别怪社会现实，社会从来都是这样。只是你以前被保护得太好，没看见而已。不是社会变了，是你长大了，从象牙塔里走出来了。
  - content: 这个社会从来不缺努力的人，缺的是“选对方向”的人。方向错了，越努力越尴尬。
  - content: 你拼命想让孩子赢在起跑线，但你不看看自己的起跑线在哪里。有些赛道，孩子还没出生，就已经输了。但这不代表放弃，而是要换一条赛道。
  - content: |
      你以为你有选择，其实你根本没有。普通人的人生，是被推着走的。
      高考、考研、找工作、买房、结婚……每一步都像在被推着走，真正能自己做主的选择少之又少。